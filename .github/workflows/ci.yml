name: CI
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize]

permissions:
  id-token: write
  checks: write
  pull-requests: write
  contents: write

jobs:
  ci:
    uses: SolaceDev/solace-public-workflows/.github/workflows/hatch_ci.yml@main
    with:
      min-python-version: "3.10"
      max-python-version: "3.13"
      whitesource_product_name: "solaceai"
      whitesource_config_file: "wss-unified-agent.config"

    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      WHITESOURCE_API_KEY: ${{ secrets.WHITESOURCE_API_KEY }}
      MANIFEST_AWS_ACCESS_KEY_ID: ${{ secrets.MANIFEST_READ_ONLY_AWS_ACCESS_KEY_ID }}
      MANIFEST_AWS_SECRET_ACCESS_KEY: ${{ secrets.MANIFEST_READ_ONLY_AWS_SECRET_ACCESS_KEY }}
  structure-test:
    name: Test Docker Image Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.COMMIT_KEY }}

      - name: Set up Hatch
        uses: SolaceDev/solace-public-workflows/.github/actions/hatch-setup@main
        with:
          min-python-version: "3.10"
          max-python-version: "3.13"

      - name: Set Up Docker Buildx
        id: builder
        uses: docker/setup-buildx-action@v3

      - name: Prepare env file
        run: |
          cp .env_template .env

      # - name: Prepare Release
      #   id: prepare-release
      #   run: |
      #     git config user.name "Github Actions build"
      #     git config user.email "build@solace.com"
      #     npx standard-version
      #     export VERSION=$(cat manifest.json | jq -r .version)
      #     echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Retrieve GitHub App Token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: SolaceDev

      - name: Login to GitHub Packages Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          # password: ${{ secrets.GH_PAT }}
          password: oauth2:${{ steps.app_token.outputs.token }}

      # - name: Prepare Tags
      #   id: prep_tags
      #   run: |
      #     GITHUB_REGISTRY_TAG_PREFIX="ghcr.io/solacedev/solace-ai-connector:"
      #     echo "GITHUB_REGISTRY_TAG_PREFIX=$GITHUB_REGISTRY_TAG_PREFIX" >> $GITHUB_ENV
      #     SHA=$(git rev-parse --short=10 HEAD)
      #     VERSION_WITH_SHA=$VERSION-$SHA
      #     echo "VERSION_WITH_SHA=$VERSION_WITH_SHA" >> $GITHUB_ENV
      #     echo "BRANCH_VERSION=$VERSION_WITH_SHA" >> $GITHUB_ENV
      #     GITHUB_REGISTRY_TAGS="${GITHUB_REGISTRY_TAG_PREFIX}${VERSION_WITH_SHA}"

      #     # Output the version with SHA for the next step
      #     echo "version_with_sha=$VERSION_WITH_SHA" >> $GITHUB_OUTPUT

      #     if [[ $GITHUB_REF == "refs/heads/main" ]]; then
      #         GITHUB_REGISTRY_TAGS="$GITHUB_REGISTRY_TAGS,${GITHUB_REGISTRY_TAG_PREFIX}${VERSION}"
      #         GITHUB_REGISTRY_TAGS="$GITHUB_REGISTRY_TAGS,${GITHUB_REGISTRY_TAG_PREFIX}latest"
      #     fi

      #     echo "ghcr_tags=${GITHUB_REGISTRY_TAGS}" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          push: false
          # tags: ${{ env.GITHUB_REGISTRY_TAG_PREFIX}}${{env.VERSION_WITH_SHA}}
          tags: solace/solace-ai-connector:local
          platforms: linux/amd64
          builder: ${{ steps.builder.outputs.name }}
          load: true
      
      - name: Run Prisma Scan on Docker Image
        uses: PaloAltoNetworks/prisma-cloud-scan@v1.5
        id: scan
        continue-on-error: true
        with:
          pcc_console_url: "https://northamerica-northeast1.cloud.twistlock.com/canada-550205635"
          pcc_user: ${{ secrets.PRISMA_ACCESS_KEY_ID }}
          pcc_pass: ${{ secrets.PRISMA_SECRET_ACCESS_KEY }}
          image_name: solace/solace-ai-connector:local
          # image_name: ${{ env.GITHUB_REGISTRY_TAG_PREFIX}}${{env.VERSION_WITH_SHA}}
      
      - name: Push Docker Image
        uses: docker/build-push-action@v5.1.0
        with:
          context: .
          platforms: linux/amd64
          push: true
          # tags: ${{ steps.prep_tags.outputs.ghcr_tags }}
          tags: solace/solace-ai-connector:local
          provenance: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          secrets: GIT_TOKEN=oauth2:${{ steps.app_token.outputs.token }}


      - name: Run Structure Tests
        shell: bash
        run: |
          hatch run make structure-test
